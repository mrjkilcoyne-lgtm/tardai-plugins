apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-mempalace-search
  namespace: tardai
  labels:
    app: tool-mempalace-search
    tardai.tool: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-mempalace-search
  template:
    metadata:
      labels:
        app: tool-mempalace-search
        tardai.tool: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/mrjkilcoyne-lgtm/tardai-plugins-mempalace-search:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: BEARER
              valueFrom:
                secretKeyRef:
                  name: tardai-auth
                  key: bearer
            - name: BUS_BASE
              value: http://tardai-tool-bus.tardai.svc.cluster.local:8000
            - name: SELF_BASE
              value: http://tool-mempalace-search.tardai.svc.cluster.local:8000
            - name: MEMPALACE_URL
              value: http://mempalace.substrates.svc.cluster.local:8095
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 12Mi
            limits:
              cpu: 100m
              memory: 64Mi
      imagePullSecrets:
        - name: ghcr-pull
