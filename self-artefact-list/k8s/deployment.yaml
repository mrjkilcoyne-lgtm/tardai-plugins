apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-self-artefact-list
  namespace: tardai
  labels:
    app: tool-self-artefact-list
    tardai.tool: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-self-artefact-list
  template:
    metadata:
      labels:
        app: tool-self-artefact-list
        tardai.tool: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/mrjkilcoyne-lgtm/tardai-plugins-self-artefact-list:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: BEARER
              valueFrom:
                secretKeyRef:
                  name: tardai-auth
                  key: bearer
            - name: ARTEFACT_BASE
              value: http://tardai-artefacts.tardai.svc.cluster.local:8000
            - name: BUS_BASE
              value: http://tardai-tool-bus.tardai.svc.cluster.local:8000
            - name: SELF_BASE
              value: http://tool-self-artefact-list.tardai.svc.cluster.local:8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 48Mi
            limits:
              cpu: 100m
              memory: 128Mi
