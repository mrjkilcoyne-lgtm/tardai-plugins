apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-time-sense
  namespace: tardai
  labels:
    app: tool-time-sense
    tardai.tool: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-time-sense
  template:
    metadata:
      labels:
        app: tool-time-sense
        tardai.tool: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/mrjkilcoyne-lgtm/tardai-plugins-time-sense:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: BEARER
              valueFrom:
                secretKeyRef:
                  name: tardai-auth
                  key: bearer
            - name: BUS_BASE
              value: http://tardai-tool-bus.tardai.svc.cluster.local:8000
            - name: SELF_BASE
              value: http://tool-time-sense.tardai.svc.cluster.local:8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 5m
              memory: 10Mi
            limits:
              cpu: 50m
              memory: 64Mi
      imagePullSecrets:
        - name: ghcr-pull
