apiVersion: v1
kind: ServiceAccount
metadata:
  name: tool-pod-introspect
  namespace: tardai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tool-pod-introspect
  namespace: tardai
rules:
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tool-pod-introspect
  namespace: tardai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tool-pod-introspect
subjects:
  - kind: ServiceAccount
    name: tool-pod-introspect
    namespace: tardai
